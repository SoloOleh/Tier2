<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <style>
    .hidden {
      display: none;
    }
  </style>
  <body>
    <ul id="message-list"></ul>
    <button class="hidden" id="close-socket">Close connection</button>

    <script>
      const messageList = document.getElementById("message-list");
      const closeBtn = document.getElementById("close-socket");

      const ws = new WebSocket("ws://localhost:5000");

      const closeSocket = ()=> {
        ws.close(1000, "Frontend close connection");
        closeBtn.classList.add("hidden");
        closeBtn.removeEventListener("click", closeSocket);
      };

      ws.addEventListener("open", ()=> {
        messageList.insertAdjacentHTML("beforeend", "<li>Connection successfully</li>");
        closeBtn.classList.remove("hidden");
        closeBtn.addEventListener("click", closeSocket);
      });

      ws.addEventListener("message", event => {
        messageList.insertAdjacentHTML("beforeend", `<li>${event.data}</li>`);
      });

      ws.addEventListener("close", event => {
        if(!event.wasClean) {
          messageList.insertAdjacentHTML("beforeend", "<li>Server crushed</li>");
        }
        else {
          messageList.insertAdjacentHTML("beforeend", `<li>Server closed. Code: ${event.code}, reason: ${event.reason}</li>`);
        }
      })
    </script>
  </body>
</html>
